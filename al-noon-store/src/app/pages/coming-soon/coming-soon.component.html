<div class="coming-soon-page">
  <div class="cs-bg-shapes">
    <div class="cs-shape cs-shape-1"></div>
    <div class="cs-shape cs-shape-2"></div>
    <div class="cs-shape cs-shape-3"></div>
  </div>

  <div class="cs-content">
    @if (logoUrl(); as url) {
      <img [src]="url" [alt]="storeName() | localized:locale.lang()" class="cs-logo" />
    }

    <div class="cs-icon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
        <circle cx="60" cy="60" r="56" stroke="currentColor" stroke-width="1.5" opacity="0.15"/>
        <circle cx="60" cy="60" r="42" stroke="currentColor" stroke-width="1" opacity="0.1"/>
        <!-- Clock face -->
        <circle cx="60" cy="60" r="30" stroke="currentColor" stroke-width="2" opacity="0.3"/>
        <!-- Hour hand -->
        <line x1="60" y1="60" x2="60" y2="40" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" class="cs-hour"/>
        <!-- Minute hand -->
        <line x1="60" y1="60" x2="75" y2="52" stroke="currentColor" stroke-width="2" stroke-linecap="round" class="cs-minute"/>
        <!-- Center dot -->
        <circle cx="60" cy="60" r="3" fill="currentColor" opacity="0.6"/>
        <!-- Star decorations -->
        <circle cx="20" cy="30" r="2" fill="currentColor" opacity="0.2" class="cs-twinkle"/>
        <circle cx="100" cy="25" r="1.5" fill="currentColor" opacity="0.15" class="cs-twinkle-delay"/>
        <circle cx="95" cy="90" r="2" fill="currentColor" opacity="0.2" class="cs-twinkle"/>
        <circle cx="25" cy="95" r="1.5" fill="currentColor" opacity="0.15" class="cs-twinkle-delay"/>
      </svg>
    </div>

    <h1 class="cs-title">{{ 'comingSoon.title' | translate }}</h1>

    @if (message(); as msg) {
      <p class="cs-message">{{ msg | localized:locale.lang() }}</p>
    } @else {
      <p class="cs-message">{{ 'comingSoon.defaultMessage' | translate }}</p>
    }

    <div class="cs-divider"></div>

    <p class="cs-footer-text">{{ 'comingSoon.stayTuned' | translate }}</p>
  </div>
</div>
